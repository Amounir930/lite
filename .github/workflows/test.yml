name: Test Suite (WhatSaaS Lite)

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          
      - name: Install pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 10
          
      - name: Install Dependencies
        run: pnpm install
        
      - name: Run Lint
        run: pnpm run lint
        
      - name: Run Unit Tests
        run: pnpm run test:unit
