version: '3.8'

services:
  evolution_api:
    image: atendare/evolution-api:v2.1.0
    container_name: evolution_api
    restart: always
    ports:
      - "8080:8080"
    environment:
      - SERVER_URL=http://localhost:8080
      - API_KEY=WhatSaaS_Secret_Key_2026
      - AUTHENTICATION_TYPE=apikey
      - STORE_MESSAGES=true
      - STORE_CONTACTS=true
      - STORE_CHATS=true
      - DATABASE_ENABLED=false # For lite development, we use local JSON storage
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=http://host.docker.internal:5000/api/webhooks/whatsapp
    networks:
      - evolution_net

networks:
  evolution_net:
    driver: bridge
